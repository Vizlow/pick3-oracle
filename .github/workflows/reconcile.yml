name: reconcile
on:
  schedule:
    - cron: '45 10 * * *'   # 6:45 AM EDT / 5:45 AM EST — after Socrata's ~5:01 AM ET refresh
  workflow_dispatch: {}
concurrency:
  group: pick3-state
  cancel-in-progress: false
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Run reconcile pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python3 -m engine.pipeline reconcile --days 7
      - name: Run tests
        run: |
          python3 -m pip install pytest -q
          CI=1 python3 -m pytest -q
      - name: Commit state
        id: commit
        run: |
          git config user.name  "pick3-oracle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data data community/state.json
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "reconcile: $(date -u +%F)"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
  publish:
    needs: reconcile
    if: needs.reconcile.outputs.pushed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pick3-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Vercel (best effort until a dashboard token is set)
        continue-on-error: true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
