name: post-draw
on:
  schedule:
    - cron: '33 18 * * *'   # 2:33 PM EDT (midday, summer)
    - cron: '3 19 * * *'    # jitter backstop ~30 min later
    - cron: '33 19 * * *'   # 2:33 PM EST (midday, winter) / 3:33 PM EDT retry in summer
    - cron: '33 2 * * *'    # 10:33 PM EDT (evening, summer; UTC date is next day)
    - cron: '3 3 * * *'     # jitter backstop
    - cron: '33 3 * * *'    # 10:33 PM EST (evening, winter) / 11:33 PM EDT retry
  workflow_dispatch: {}
concurrency:
  group: pick3-state
  cancel-in-progress: false
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  postdraw:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Run post-draw pipeline
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python3 -m engine.pipeline postdraw --max-wait-min 30
      - name: Commit state
        id: commit
        run: |
          git config user.name  "pick3-oracle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add site/data data community/state.json
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          DRAW=$(python3 -m engine.pipeline last-processed)
          git commit -m "draw ${DRAW}: grade + next prediction"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
  publish:
    needs: postdraw
    if: needs.postdraw.outputs.pushed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    concurrency:
      group: pick3-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Deploy to Vercel (best effort until a dashboard token is set)
        continue-on-error: true
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx --yes vercel@latest deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
